services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - AGENT_URL=http://agentpy:8002
      - ROCKETPY_URL=http://rocketpy:8000
      # Database configuration
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # API Keys
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXT_PUBLIC_OPENWEATHER_API_KEY=${NEXT_PUBLIC_OPENWEATHER_API_KEY}
      - WEATHERAPI_KEY=${WEATHERAPI_KEY}
      - NEXT_PUBLIC_NOAA_API_KEY=${NEXT_PUBLIC_NOAA_API_KEY}
      # Cache configuration
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
    env_file:
      - .env
    volumes:
      # Mount source code for hot reloading
      - ./app:/app/app:cached
      - ./components:/app/components:cached
      - ./lib:/app/lib:cached
      - ./types:/app/types:cached
      - ./public:/app/public:cached
      - ./tailwind.config.js:/app/tailwind.config.js:cached
      - ./next.config.js:/app/next.config.js:cached
      - ./tsconfig.json:/app/tsconfig.json:cached
      - ./package.json:/app/package.json:cached
      # Exclude node_modules to avoid conflicts
      - /app/node_modules
      - /app/.next
    depends_on:
      agentpy:
        condition: service_healthy
      rocketpy:
        condition: service_healthy
    networks:
      - rocket-network
    command: npm run dev

  agentpy:
    build: 
      context: ./services/agentpy
      dockerfile: Dockerfile.dev
    ports:
      - "8002:8002"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    env_file:
      - .env
    volumes:
      # Mount source code for hot reloading
      - ./services/agentpy:/app:cached
      - /app/__pycache__
    networks:
      - rocket-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: python -m uvicorn app:app --host 0.0.0.0 --port 8002 --reload

  rocketpy:
    build: 
      context: ./services/rocketpy
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
    volumes:
      # Mount source code for hot reloading
      - ./services/rocketpy:/app:cached
      - ./lib/data:/app/lib/data:ro
      - /app/__pycache__
    networks:
      - rocket-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: python -m uvicorn app:app --host 0.0.0.0 --port 8000 --reload

networks:
  rocket-network:
    driver: bridge

volumes:
  rocket-data:
    driver: local 